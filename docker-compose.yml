services:
  pmm:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - pmm-data:/app/data
    environment:
      - NEXTAUTH_SECRET=change-this-to-a-random-secret
      - NEXTAUTH_URL=http://localhost:3000
      - DATABASE_URL=file:/app/data/pmm.db
    restart: unless-stopped

volumes:
  pmm-data:
